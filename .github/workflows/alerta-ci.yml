name: alerta-ci

on:
  push:
    branches: ["**"]
    paths-ignore:
      - 'apps/alerta/.state/**'
  pull_request:
    paths-ignore:
      - 'apps/alerta/.state/**'

jobs:
  test:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static checks
        run: npm run alerta:check

      - name: Unit tests
        run: npm run test
